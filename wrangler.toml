# Cloudflare Workers static-assets config for this static Astro site.
# Cloudflare's Git integration created a Workers project (deploy command: `wrangler deploy`),
# so we serve the built `dist/` as an assets-only Worker — no server code needed.
name = "welldun-blog"
compatibility_date = "2026-06-26"

[assets]
directory = "./dist"
